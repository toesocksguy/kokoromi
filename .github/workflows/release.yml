name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and publish release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Build release APK
        env:
          SIGNING_KEYSTORE_PATH: keystore.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          name: "${{ github.ref_name }} (beta)"
          body: |
            **This is a beta release.** Expect rough edges — not all features are complete.

            Install the APK directly on your Android device (API 26+). You may need to enable "Install from unknown sources" in your device settings.

            See the [README](https://github.com/toesocksguy/kokoromi/blob/main/README.md) for what's in this build.
          files: app/build/outputs/apk/release/app-release.apk
